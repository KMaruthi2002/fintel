name: Publish to PyPI

# Triggered when a version tag is pushed, e.g. `git tag v1.0.0 && git push origin v1.0.0`.
# Also can be triggered manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    # The environment name here MUST match the one registered with the
    # PyPI trusted publisher (see https://pypi.org/manage/account/publishing/).
    environment:
      name: pypi
      url: https://pypi.org/project/fintel/

    # `id-token: write` is what lets GitHub Actions mint the OIDC token
    # that PyPI accepts in place of a password or API token.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distribution metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish to PyPI
        # Uses OIDC trusted publishing — no password or token required
        # because the project is registered as a trusted publisher on PyPI.
        uses: pypa/gh-action-pypi-publish@release/v1
